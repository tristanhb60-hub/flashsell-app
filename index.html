/* ── Analyse image : API Claude → fallback mock ── */
async function runAnalysis(base64, mediaType) {
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:`Tu es un expert copywriting premium pour la vente en ligne. Analyse cette image et génère une fiche produit optimisée pour Vinted et eBay. Réponds UNIQUEMENT en JSON valide, sans markdown, sans commentaire :
{"title":"<titre accrocheur SEO max 65 chars>","description":"<2-3 phrases copywriting haut de gamme qui donnent envie d'acheter>","price":{"low":<int€>,"mid":<int€>,"high":<int€>},"keywords":["<mot1>","<mot2>","<mot3>","<mot4>","<mot5>","<mot6>","<mot7>","<mot8>"]}
Prix en euros entiers, réalistes pour la revente seconde main.`}
        ]}]
      })
    });
    if (!r.ok) throw new Error('api_fail');
    const d = await r.json();
    const txt = (d.content||[]).find(b=>b.type==='text')?.text||'';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
  } catch(_) {
    /* Fallback : délai simulé + template aléatoire */
    await new Promise(res=>setTimeout(res,3200));
    const m = window._MOCKS;
    return m[Math.floor(Math.random()*m.length)];
  }
}

/* ════════════════ AI LOADER ════════════════ */
function AILoader() {
  const msgs = ['Analyse visuelle en cours…',"Identification de l'objet…",'Rédaction du copywriting…','Estimation du prix marché…'];
  const [step,setStep] = useState(0);
  useEffect(()=>{const t=setInterval(()=>setStep(s=>Math.min(s+1,msgs.length-1)),900);return()=>clearInterval(t);},[]);
  return (
    <div style={{textAlign:'center',padding:'48px 24px'}}>
      <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center',width:88,height:88,marginBottom:24}}>

        <ISpark s={18} c="#007AFF"/>
      </div>
      <p style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:16,color:'var(--text)',marginBottom:8}}>L'IA analyse votre objet</p>
      <p style={{fontSize:13,color:'var(--text-muted)',minHeight:20}}>{msgs[step]}</p>

  );
}

/* ════════════════ RESULT CARD ════════════════ */
function ResultCard({result}) {
  const [cp,setCp]=useState(null);
  const copy=(text,k)=>{try{navigator.clipboard?.writeText(text);}catch(_){}setCp(k);setTimeout(()=>setCp(null),1800);};
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="glass fade-up-1" style={{borderRadius:'var(--radius)',padding:'20px 24px'}}>
        <p className="label-upper" style={{marginBottom:10}}>✦ Titre optimisé</p>
        <p style={{fontFamily:'var(--font-display)',fontSize:20,fontWeight:700,color:'var(--text)',lineHeight:1.3,marginBottom:12}}>{result.title}</p>
        <button className="btn-ghost" style={{fontSize:12,padding:'5px 14px'}} onClick={()=>copy(result.title,'t')}>{cp==='t'?'✓ Copié !':'Copier'}</button>
      </div>
      <div className="glass fade-up-2" style={{borderRadius:'var(--radius)',padding:'20px 24px'}}>
        <p className="label-upper" style={{marginBottom:10}}>✍ Description persuasive</p>
        <p style={{fontSize:14,lineHeight:1.75,color:'rgba(240,240,245,.7)',marginBottom:12}}>{result.description}</p>
        <button className="btn-ghost" style={{fontSize:12,padding:'5px 14px'}} onClick={()=>copy(result.description,'d')}>{cp==='d'?'✓ Copié !':'Copier'}</button>
      </div>
      <div className="glass fade-up-3" style={{borderRadius:'var(--radius)',padding:'20px 24px'}}>
        <p className="label-upper" style={{marginBottom:14}}>💰 Estimation de prix</p>
        <div style={{display:'flex',gap:10}}>
          {[{l:'Bas',v:result.price?.low},{l:'Recommandé',v:result.price?.mid,f:true},{l:'Haut',v:result.price?.high}].map(p=>(
            <div key={p.l} className={`price-card${p.f?' featured':''}`}>
              <div style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:700,color:p.f?'#007AFF':'var(--text)'}}>{p.v}€</div>
              <div style={{fontSize:11,marginTop:4,color:p.f?'rgba(0,122,255,.65)':'var(--text-muted)'}}>{p.l}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="glass fade-up-4" style={{borderRadius:'var(--radius)',padding:'20px 24px'}}>
        <p className="label-upper" style={{marginBottom:12,display:'flex',alignItems:'center',gap:6}}><ITag/> Mots-clés Vinted / eBay</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {(result.keywords||[]).map(kw=>(
            <span key={kw} className="tag" style={{cursor:'pointer'}} onClick={()=>copy(kw,'kw'+kw)}>{cp==='kw'+kw?'✓ ':'#'}{kw}</span>
          ))}
        </div>
        <p style={{fontSize:11,color:'var(--text-dim)',marginTop:10}}>Cliquez sur un tag pour le copier</p>
      </div>
    </div>
  );
}

    setBusy(true); setErr(''); setInfo('');
    if (mode==='login') {
      const {error} = await sb.auth.signInWithPassword({email:email.trim(),password:pass});
      if (error) setErr(error.message==='Invalid login credentials'?'Email ou mot de passe incorrect.':error.message);
      else onClose();
    } else {
      const {error} = await sb.auth.signUp({email:email.trim(),password:pass,options:{emailRedirectTo:window.location.origin}});
      if (error) setErr(error.message);
      else { setInfo('Email de confirmation envoyé. Vérifiez votre boîte, puis connectez-vous.'); setMode('login'); }
    }
    setBusy(false);
  };

  const forgotPwd = async () => {
    if (!email.trim()){setErr('Entrez votre email d\'abord.');return;}
    await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.origin});
    setInfo('Lien de réinitialisation envoyé !');
  };

  return (
    <div className="backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="glass-strong fade-up" style={{borderRadius:'var(--radius-lg)',padding:'32px 28px',maxWidth:400,width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{width:52,height:52,borderRadius:16,background:'linear-gradient(135deg,#007AFF,#00D4FF)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:22,marginBottom:12}}>⚡</div>
          <p style={{fontFamily:'var(--font-display)',fontSize:20,fontWeight:700,color:'var(--text)',marginBottom:4}}>Connexion à FlashSell.ai</p>
          <p style={{fontSize:13,color:'var(--text-muted)'}}>1 analyse gratuite à l'inscription</p>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:20}}>
          <button className={`auth-tab${tab==='google'?' active':''}`} onClick={()=>{setTab('google');setErr('');}}>
            <IGoogle/>&nbsp;Google
          </button>
          <button className={`auth-tab${tab==='email'?' active':''}`} onClick={()=>{setTab('email');setErr('');}}>
            <IMail/>&nbsp;Email
          </button>
        </div>

        {tab==='google' && (
          <div>
            <button className="btn-primary" onClick={googleLogin} disabled={busy} style={{width:'100%',padding:'13px',borderRadius:'var(--radius)',gap:10}}>
              <IGoogle/>{busy?'Redirection…':'Continuer avec Google'}
            </button>
            <p style={{fontSize:11,color:'var(--text-dim)',textAlign:'center',marginTop:10}}>
              Vous serez redirigé vers Google, puis revenu ici automatiquement.
            </p>
            {err && <div className="error-banner fade-up" style={{marginTop:10}}>{err}</div>}
            <div className="warn-box fade-up" style={{marginTop:14}}>
              <strong style={{display:'block',marginBottom:4}}>⚙️ Config Supabase requise</strong>
              Dashboard → Authentication → URL Configuration<br/>
              • <code style={{background:'rgba(255,255,255,.06)',padding:'1px 5px',borderRadius:3}}>Site URL</code> : votre domaine Vercel<br/>
              • <code style={{background:'rgba(255,255,255,.06)',padding:'1px 5px',borderRadius:3}}>Redirect URLs</code> : votre domaine Vercel
            </div>
          </div>
        )}

        {tab==='email' && (
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',gap:8}}>
              <button className={`mode-btn${mode==='login'?' active':''}`} onClick={()=>{setMode('login');setErr('');setInfo('');}}>Se connecter</button>
              <button className={`mode-btn${mode==='signup'?' active':''}`} onClick={()=>{setMode('signup');setErr('');setInfo('');}}>Créer un compte</button>
            </div>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="adresse@email.com"/>
            <input className="input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Mot de passe" onKeyDown={e=>e.key==='Enter'&&emailAction()}/>
            {err  && <div className="error-banner fade-up">{err}</div>}
            {info && <div className="success-banner fade-up" style={{fontSize:13}}>{info}</div>}
            <button className="btn-primary" onClick={emailAction} disabled={busy} style={{width:'100%',padding:'13px',borderRadius:'var(--radius)',marginTop:2}}>
              {busy?'…':mode==='login'?'Se connecter →':'Créer mon compte →'}
            </button>
            {mode==='login' && (
              <button onClick={forgotPwd} style={{background:'none',border:'none',color:'var(--text-dim)',fontSize:12,cursor:'pointer',textDecoration:'underline',textAlign:'left'}}>
                Mot de passe oublié ?
              </button>
            )}
          </div>
        )}

        <button onClick={onClose} style={{display:'block',width:'100%',marginTop:16,background:'none',border:'none',color:'var(--text-dim)',fontSize:12,cursor:'pointer',padding:6}}>
          Fermer
        </button>
      </div>
    </div>
  );
}

/* ════════════════ PAYWALL ════════════════ */
function PaywallModal({userId,onClose,onUnlock}) {
  const [promo,setPromo] = useState('');
  const [st,setSt]       = useState(null);

  const checkPromo = () => {
    if (promo.trim().toLowerCase()==='flayc0') {
      if(userId) window._setPro(userId);
      setSt('ok');
      setTimeout(()=>{onUnlock();onClose();},2000);
    } else setSt('err');
  };

  const perks = ['Analyses IA illimitées','Copywriting premium génératif','Estimation multi-plateformes','Téléchargement des fiches produit','Support prioritaire'];
  return (
    <div className="backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="glass-strong fade-up" style={{borderRadius:'var(--radius-lg)',padding:'36px 32px',maxWidth:420,width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{width:64,height:64,borderRadius:20,background:'#007AFF',display:'inline-flex',alignItems:'center',justifyContent:'center',animation:'pulse-ring 2s infinite',marginBottom:14}}><ICrown/></div>
          <p style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:5}}>Passez à FlashSell Pro</p>
          <p style={{fontSize:13,color:'var(--text-muted)'}}>Analyses illimitées · Zéro friction</p>
        </div>
        <div className="glass" style={{borderRadius:'var(--radius)',padding:'20px 24px',marginBottom:18}}>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'center',gap:4,marginBottom:14}}>
            <span style={{fontFamily:'var(--font-display)',fontSize:46,fontWeight:800,color:'#007AFF',lineHeight:1}}>9,99€</span>
            <span style={{fontSize:14,color:'var(--text-muted)'}}>/mois</span>
          </div>
          {perks.map(p=><div key={p} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'rgba(240,240,245,.7)',marginBottom:6}}><ICheck s={14}/>{p}</div>)}
        </div>
        <p style={{fontSize:12,color:'var(--text-dim)',marginBottom:8}}>Vous avez un code promo ?</p>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input className="input" type="text" value={promo} onChange={e=>setPromo(e.target.value)} onKeyDown={e=>e.key==='Enter'&&checkPromo()} placeholder="ex: FLASH50" style={{flex:1}}/>
          <button className="btn-ghost" onClick={checkPromo} style={{padding:'0 16px',flexShrink:0}}>Valider</button>
        </div>
        {st==='ok'  && <div className="success-banner fade-up">🎉 1 MOIS GRATUIT ACTIVÉ !</div>}
        {st==='err' && <div className="error-banner fade-up">Code invalide. Réessayez.</div>}
        <button className="btn-primary" style={{width:'100%',padding:'14px',fontSize:15,borderRadius:'var(--radius)',marginTop:14}}>
          Commencer l'abonnement →
        </button>
        <button onClick={onClose} style={{display:'block',width:'100%',marginTop:10,background:'none',border:'none',color:'var(--text-dim)',fontSize:13,cursor:'pointer',padding:8}}>
          Continuer sans Pro
        </button>
      </div>
    </div>
  );
}

/* ════════════════ APP ════════════════ */
function App() {
  const [session,    setSession]    = useState(null);
  const [authInit,   setAuthInit]   = useState(false);
  const [showAuth,   setShowAuth]   = useState(false);
  const [showPW,     setShowPW]     = useState(false);
  const [image,      setImage]      = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [result,     setResult]     = useState(null);
  const [usage,      setUsage_]     = useState(0);
  const [isPro,      setIsPro]      = useState(false);
  const [isDrag,     setIsDrag]     = useState(false);
  const [err,        setErr]        = useState(null);
  const fileRef = useRef(null);

  /* Auth init */
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if (session?.user) {
        setUsage_(window._getUsage(session.user.id));
        setIsPro(window._getPro(session.user.id));
      }
      setAuthInit(true);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_ev,sess)=>{
      setSession(sess);
      if (sess?.user) {
        setUsage_(window._getUsage(sess.user.id));
        setIsPro(window._getPro(sess.user.id));
      }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const logout = async()=>{ await sb.auth.signOut(); setSession(null); setIsPro(false); setUsage_(0); setImage(null); setResult(null); };

  /* File */
  const processFile = useCallback(f=>{
    if (!f||!f.type.startsWith('image/')) return;
    const r=new FileReader();
    r.onload=e=>{setImage(e.target.result);setResult(null);setErr(null);};
    r.readAsDataURL(f);
  },[]);
  const onDragOver  = useCallback(e=>{e.preventDefault();setIsDrag(true);},[]);
  const onDragLeave = useCallback(()=>setIsDrag(false),[]);
  const onDrop      = useCallback(e=>{e.preventDefault();setIsDrag(false);processFile(e.dataTransfer.files[0]);},[processFile]);

  /* Analyze */
  const analyze = async()=>{
    if (!image) return;
    if (!session) { setShowAuth(true); return; }
    const uid = session.user.id;
    if (usage>=1 && !isPro) { setShowPW(true); return; }
    setLoading(true); setResult(null); setErr(null);
    try {
      const b64   = image.split(',')[1];
      const mtype = image.split(';')[0].split(':')[1]||'image/jpeg';
      const data  = await runAnalysis(b64,mtype);
      setResult(data);
      const n = usage+1;
      setUsage_(n);
      window._setUsage(uid,n);
    } catch(e) {
      setErr('Analyse échouée. Vérifiez votre connexion et réessayez.');
    }
    setLoading(false);
  };

  /* User display */
  const user = session?.user;
  const displayName = user?.user_metadata?.full_name || user?.email || '';
  const initials = displayName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';

  const features = [
    {icon:'🎯',title:'Titre SEO',desc:'Optimisé pour être trouvé'},
    {icon:'✍️',title:'Copywriting',desc:'Texte qui convertit'},
    {icon:'💰',title:'Prix juste',desc:'Estimation marché IA'},
    {icon:'🏷️',title:'Mots-clés',desc:'Vinted & eBay ready'},
  ];

  if (!authInit) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}}>
      <div style={{width:24,height:24,borderRadius:'50%',border:'2px solid rgba(0,122,255,.2)',borderTopColor:'#007AFF',animation:'spin-cw 1s linear infinite'}}/>
      <span style={{color:'var(--text-muted)',fontSize:14}}>Chargement…</span>
    </div>
  );

  return (
    <div className="bg-mesh">
      {/* NAV */}
      <nav className="nav">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#007AFF,#00D4FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,boxShadow:'0 0 20px rgba(0,122,255,.4)'}}>⚡</div>
          <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:17,color:'var(--text)'}}>
            FlashSell<span style={{color:'#007AFF'}}>.ai</span>
          </span>
          {isPro && <span className="tag" style={{fontSize:10,padding:'2px 8px',gap:4}}><ICrown/> PRO</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {!user ? (
            <button className="btn-ghost" onClick={()=>setShowAuth(true)} style={{padding:'7px 14px'}}>
              <IGoogle/> Se connecter
            </button>
          ) : (
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              {!isPro && (
                <button className="btn-ghost" onClick={()=>setShowPW(true)} style={{fontSize:12,padding:'6px 12px',color:'#007AFF',borderColor:'var(--blue-border)'}}>
                  Passer Pro
                </button>
              )}
              <div onClick={logout} title={`${displayName} — cliquer pour déconnexion`}
                style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#007AFF,#0044CC)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',cursor:'pointer'}}>
                {initials}
              </div>
            </div>
          )}
        </div>
      </nav>

      {/* MAIN */}
      <div style={{maxWidth:640,margin:'0 auto',padding:'48px 16px 80px'}}>

        {/* Hero */}
        <div style={{textAlign:'center',marginBottom:48}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 16px',borderRadius:100,background:'rgba(0,122,255,.1)',border:'1px solid rgba(0,122,255,.2)',marginBottom:24}}>
            <div className="glow-dot"/>
            <span style={{fontSize:12,fontWeight:600,color:'#60AAFF',letterSpacing:'.05em'}}>Propulsé par Claude AI</span>
          </div>
          <h1 style={{fontFamily:'var(--font-display)',fontSize:'clamp(32px,7vw,56px)',fontWeight:800,lineHeight:1.1,marginBottom:18,letterSpacing:'-.02em'}}>
            <span className="gradient-text">Transformez vos objets</span><br/>
            <span style={{color:'var(--text)'}}>en cash avec l'IA</span>
          </h1>
          <p style={{fontSize:'clamp(15px,2vw,18px)',color:'var(--text-muted)',maxWidth:400,margin:'0 auto',lineHeight:1.6}}>
            Photographiez n'importe quoi. L'IA génère le titre, la description et le prix parfaits en quelques secondes.
          </p>
        </div>

        {/* Login banner si non connecté */}
        {!user && (
          <div className="glass fade-up" style={{borderRadius:'var(--radius)',padding:'20px 24px',marginBottom:24,textAlign:'center',borderColor:'rgba(0,122,255,.25)'}}>
            <p style={{fontWeight:600,fontSize:15,color:'var(--text)',marginBottom:6}}>🔐 Connectez-vous pour analyser</p>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:14}}>1 analyse gratuite offerte. Aucune carte requise.</p>
            <button className="btn-primary" onClick={()=>setShowAuth(true)} style={{padding:'11px 28px',borderRadius:'var(--radius)'}}>
              <IGoogle/> Se connecter gratuitement
            </button>
          </div>
        )}

        {/* Upload / Results */}
        {!image ? (
          <>
            <div className={`drop-zone${isDrag?' active':''}`}
              style={{border:'2px dashed rgba(255,255,255,.1)',borderRadius:'var(--radius-lg)',padding:'56px 24px',textAlign:'center',cursor:'pointer',marginBottom:24}}
              onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
              onClick={()=>fileRef.current?.click()}>
              <div className="float" style={{marginBottom:16}}><IUpload/></div>
              <p style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:17,color:'var(--text)',marginBottom:8}}>Glissez votre photo ici</p>
              <p style={{fontSize:13,color:'var(--text-dim)'}}>ou <span style={{color:'#007AFF',textDecoration:'underline'}}>cliquez pour sélectionner</span> · JPG, PNG, WEBP, HEIC</p>
              <input ref={fileRef} type="file" accept="image/*" onChange={e=>processFile(e.target.files[0])} style={{display:'none'}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
              {features.map(f=>(
                <div key={f.title} className="glass" style={{borderRadius:'var(--radius)',padding:'18px 20px',display:'flex',alignItems:'center',gap:14}}>
                  <div style={{fontSize:26,flexShrink:0}}>{f.icon}</div>
                  <div>
                    <p style={{fontWeight:600,fontSize:14,color:'var(--text)',marginBottom:2}}>{f.title}</p>
                    <p style={{fontSize:12,color:'var(--text-dim)'}}>{f.desc}</p>
                  </div>
                </div>
              ))}
            </div>
            <p style={{textAlign:'center',fontSize:12,color:'var(--text-dim)',marginTop:24}}>
              🔒 Vos photos ne sont pas stockées · 1ère analyse <span style={{color:'#007AFF'}}>gratuite</span>
            </p>
          </>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{position:'relative',borderRadius:'var(--radius-lg)',overflow:'hidden',border:'1px solid var(--border)'}}>
              <img src={image} alt="Objet" style={{width:'100%',maxHeight:300,objectFit:'cover',display:'block'}}/>
              <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(8,8,16,.7) 0%,transparent 45%)',pointerEvents:'none'}}/>
              <button onClick={()=>{setImage(null);setResult(null);setErr(null);}}
                style={{position:'absolute',top:12,right:12,width:30,height:30,borderRadius:'50%',background:'rgba(8,8,16,.75)',border:'1px solid var(--border-hover)',color:'var(--text)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <IX/>
              </button>
              {!result&&!loading&&<div style={{position:'absolute',bottom:14,left:0,right:0,textAlign:'center'}}><span style={{fontSize:12,color:'rgba(255,255,255,.5)'}}>Photo prête ✓</span></div>}
            </div>

            {err && <div className="error-banner fade-up">{err}</div>}

            {!result&&!loading&&(
              <button className="btn-primary" onClick={analyze} style={{width:'100%',padding:'16px',fontSize:16,borderRadius:'var(--radius)'}}>
                <ISpark s={18} c="#fff"/>
                {!user?'Connectez-vous pour analyser':"Analyser avec l'IA"}
                {user&&usage===0&&<span style={{fontSize:11,background:'rgba(255,255,255,.2)',padding:'3px 10px',borderRadius:100}}>GRATUIT</span>}
              </button>
            )}

            {loading&&<div className="glass" style={{borderRadius:'var(--radius-lg)'}}><AILoader/></div>}
            {result&&<ResultCard result={result}/>}
            {result&&(
              <button className="btn-ghost" onClick={()=>{setImage(null);setResult(null);setErr(null);}} style={{width:'100%',padding:'13px',marginTop:4,borderRadius:'var(--radius)'}}>
                ↩ Analyser un autre objet
              </button>
            )}
          </div>
        )}

        {/* Usage indicator */}
        {user&&!isPro&&(
          <div style={{textAlign:'center',marginTop:24}}>
            <p style={{fontSize:12,color:'var(--text-dim)'}}>
              {usage===0
                ?<>🎁 <span style={{color:'var(--text-muted)'}}>1 analyse gratuite disponible</span></>
                :<><span style={{color:'var(--text-muted)'}}>{usage} analyse(s) utilisée(s) · </span><span style={{color:'#007AFF',cursor:'pointer'}} onClick={()=>setShowPW(true)}>Débloquez Pro →</span></>
              }
            </p>
          </div>
        )}
      </div>

      {/* MODALS */}
      {showAuth && <AuthModal onClose={()=>setShowAuth(false)}/>}
      {showPW   && (
        <PaywallModal
          userId={user?.id}
          onClose={()=>setShowPW(false)}
          onUnlock={()=>setIsPro(true)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
