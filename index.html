    /*══════════════════════════════════════
      DESIGN SYSTEM — FlashSell v2
    ══════════════════════════════════════*/
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#007AFF;--blue-d:rgba(0,122,255,.14);--blue-b:rgba(0,122,255,.28);
      --blue-g:rgba(0,122,255,.32);--cyan:#00D4FF;
      --green:#30D158;--red:#FF453A;--gold:#FFD60A;--amber:#FF9F0A;
      --purple:#BF5AF2;--indigo:#5E5CE6;
      --bg:#07070F;--bg2:rgba(11,11,21,.96);
      --s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);--s3:rgba(255,255,255,.1);
      --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--b3:rgba(255,255,255,.2);

      --r:16px;--rs:10px;--rl:24px;--rxl:32px;
      --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    #root{min-height:100vh}

    /* Mesh */
    .mesh{background:
      radial-gradient(ellipse 80% 60% at 5% 30%,rgba(0,122,255,.11) 0%,transparent 58%),
      radial-gradient(ellipse 60% 50% at 90% 10%,rgba(0,212,255,.07) 0%,transparent 54%),
      radial-gradient(ellipse 70% 70% at 60% 95%,rgba(0,60,200,.09) 0%,transparent 52%),
      var(--bg);min-height:100vh}

    /* Glass layers */
    .g1{background:var(--s1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--b1)}
    .g2{background:rgba(10,10,22,.88);backdrop-filter:blur(44px);-webkit-backdrop-filter:blur(44px);border:1px solid var(--b2)}
    .g3{background:rgba(7,7,17,.97);backdrop-filter:blur(64px);-webkit-backdrop-filter:blur(64px);border:1px solid var(--b2)}
    .g-purple{background:rgba(20,8,36,.97);backdrop-filter:blur(64px);-webkit-backdrop-filter:blur(64px);border:1px solid rgba(191,90,242,.22)}

    /* Text */
    .gx{background:linear-gradient(128deg,#fff 0%,#6DBAFF 40%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .gx-gold{background:linear-gradient(128deg,#FFD60A,#FF9F0A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .gx-purple{background:linear-gradient(128deg,#BF5AF2,#5E5CE6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .lbl{font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--blue)}

    /* Buttons */
    .btn{background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn:hover:not(:disabled){background:#0068DD;transform:translateY(-1px);box-shadow:0 12px 38px var(--blue-g)}
    .btn:active:not(:disabled){transform:scale(.98)}
    .btn:disabled{opacity:.42;cursor:not-allowed}
    .btn-o{background:var(--s1);color:var(--t2);border:1px solid var(--b1);border-radius:var(--rs);font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn-o:hover:not(:disabled){background:var(--s2);border-color:var(--b2);color:var(--t1)}
    .btn-o:disabled{opacity:.38;cursor:not-allowed}
    .btn-gold{background:linear-gradient(135deg,#FFD60A,#FF9F0A);color:#000;border:none;border-radius:var(--r);font-family:var(--fb);font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}

    .btn-stripe{background:linear-gradient(135deg,#635BFF,#8B5CF6);color:#fff;border:none;border-radius:var(--r);font-family:var(--fb);font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}

    .si{animation:slide-in .3s cubic-bezier(.4,0,.2,1) both}

    /* Switch toggle */
    .switch{position:relative;width:44px;height:24px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:var(--s3);border:1px solid var(--b2);border-radius:100px;cursor:pointer;transition:.25s}
    .slider:before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.25s}
    input:checked+.slider{background:var(--blue);border-color:var(--blue)}
    input:checked+.slider:before{transform:translateX(20px)}

    /* News/roadmap */
    .news-card{padding:18px 20px;border-radius:var(--r);background:var(--s1);border:1px solid var(--b1);transition:border-color .2s}
    .news-card:hover{border-color:var(--b2)}

    /* Table */
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{color:var(--t3);font-weight:500;padding:8px 12px;text-align:left;border-bottom:1px solid var(--b1)}
    .tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--t2);vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}

    /* Auth tabs */
    .atab{flex:1;padding:10px;background:none;border:none;color:var(--t3);font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s}
    .atab.on{color:var(--t1);border-bottom-color:var(--blue)}
    .mbtn{flex:1;padding:8px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--b1);color:var(--t2);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
    .mbtn.on{background:var(--blue-d);border-color:var(--blue-b);color:#6DBAFF}
    .div{display:flex;align-items:center;gap:10px;color:var(--t3);font-size:12px;margin:12px 0}
    .div::before,.div::after{content:'';flex:1;height:1px;background:var(--b1)}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}

    /* Tabs nav (public) */
    .tab-bar{display:flex;gap:4px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:4px;margin-bottom:28px}
    .tab-btn{flex:1;padding:9px 12px;background:none;border:none;color:var(--t2);font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--rs);transition:all .18s}
    .tab-btn.on{background:var(--s3);color:var(--t1)}

    /* Loading shimmer */
    .shimmer{background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite;border-radius:var(--rs)}

    /* Structured result */
    .result-section{padding:14px 0;border-bottom:1px solid var(--b1)}
    .result-section:last-child{border-bottom:none;padding-bottom:0}
  </style>
</head>

/* ═══════════════════════════════════════

window._isProUser = async (email) => {

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
window._ae = (msg) => {
  const m = (msg||'').toLowerCase();
  if (m.includes('invalid login credentials'))    return 'Email ou mot de passe incorrect.';
  if (m.includes('user already registered')||m.includes('email already')) return 'Cet email est déjà utilisé. Connectez-vous.';
  if (m.includes('password should be at least'))  return 'Mot de passe trop court (6 caractères minimum).';
  if (m.includes('email not confirmed'))           return 'Confirmez votre email avant de vous connecter.';
  if (m.includes('too many requests'))             return 'Trop de tentatives. Patientez quelques minutes.';
  if (m.includes('network'))                       return 'Erreur réseau. Vérifiez votre connexion.';
  if (m.includes('provider is not enabled'))       return 'Google Auth non configuré dans Supabase.';
  return msg || 'Une erreur est survenue.';
};

/* ═══════════════════════════════════════
   DÉTECTION COULEUR DOMINANTE (Canvas)
═══════════════════════════════════════ */
window._dominantColor = (base64) => new Promise(resolve => {
  try {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = 80; cv.height = 80;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0, 80, 80);
      const px = ctx.getImageData(0,0,80,80).data;
      let r=0,g=0,b=0,n=0;
      for (let i=0;i<px.length;i+=4){
        const br=(px[i]+px[i+1]+px[i+2])/3;
        if (br>238||br<16) continue;
        r+=px[i];g+=px[i+1];b+=px[i+2];n++;
      }
      if (!n) { resolve({name:'neutre',hex:'#888888'}); return; }
      r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
      const mx=Math.max(r,g,b),mn=Math.min(r,g,b),df=mx-mn;
      let name='neutre';
      if (df<28)      name=mx>160?'blanc/crème':'gris sombre';
      else if(r>g&&r>b) name=r>185?'rouge vif':'bordeaux/marron';
      else if(g>r&&g>b) name=g>155?'vert vif':'kaki/olive';
      else if(b>r&&b>g) name=b>155?'bleu vif':'marine/denim';
      else if(r>150&&g>150&&b<90) name='jaune/moutarde';
      else if(r>150&&b>120&&g<100) name='violet/rose';
      else if(r>145&&g>85&&b<55)  name='orange/rouille';
      const hex = '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
      resolve({name,hex,r,g,b});
    };
    img.onerror = ()=>resolve({name:'neutre',hex:'#888'});
    img.src = 'data:image/jpeg;base64,'+base64;
  } catch(_){ resolve({name:'neutre',hex:'#888'}); }
});

async function analyzeImage(base64, mediaType, userId) {
  const color = await window._dominantColor(base64);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        system: `Tu es un expert en revente en ligne, spécialiste Vinted, Leboncoin et eBay en France. Tu analyses des photos d'articles de seconde main avec la précision d'un acheteur professionnel. Tu identifies la marque, le modèle, l'état, la matière et tu estimes les prix du marché réel en France.`,
        messages: [{
          role: 'user',
          content: [
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:`MISSION : Analyse cette photo d'article à vendre.

RÈGLE CRITIQUE : Si tu détectes plusieurs objets DISTINCTS (ex: une chaussure + une veste + un sac) qui n'appartiennent pas au même ensemble, réponds UNIQUEMENT avec ce JSON exact :
{"error":"multi_object","message":"Un seul article par photo SVP. Je détecte plusieurs objets différents sur cette image."}

Sinon, génère une fiche produit complète en JSON strict (sans markdown, sans commentaires) :
{
  "brand": "<marque exacte ou 'Non identifiée'>",
  "category": "<catégorie précise : Vêtement homme/femme, Chaussures, Électronique, etc.>",
  "title": "<titre accrocheur SEO max 65 chars — inclure marque si identifiée>",
  "condition": "<description de l'état visible : Neuf avec étiquette / Très bon état / Bon état / État correct>",
  "description": "<3-4 phrases naturelles et humanisées. Mentionner : état, matière si visible, taille si lisible, style. Ton vendeur passionné, pas robotique. Finir par une accroche motivante.>",
  "price": {"low":<int€ prix bas raisonnable marché FR>,"mid":<int€ prix recommandé réaliste>,"high":<int€ si très bon état ou rare>},
  "keywords": ["<8 mots-clés pertinents pour Vinted/eBay, incluant marque si connue>"],
  "color_detected": "${color.name}"
}

Contexte couleur détectée automatiquement : ${color.name} (${color.hex}).
Prix en euros entiers, RÉALISTES pour le marché de la revente seconde main en France en 2024-2025.`}
          ]
        }]
      })
    });

    if (!res.ok) throw new Error('api_'+res.status);
    const d = await res.json();
    const txt = (d.content||[]).find(b=>b.type==='text')?.text||'';
    const clean = txt.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if (parsed.error === 'multi_object') {
      return { _error: 'multi_object', _message: parsed.message };
    }

    parsed._source = 'claude';
    if (userId) await window._logAnalysis(userId);
    return parsed;

  } catch(_) {
    await new Promise(r=>setTimeout(r,2800));
    const mock = window._smartMock(color);
    if (userId) await window._logAnalysis(userId);
    return mock;
  }
}

function AuthModal({onClose}) {

  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [info,setInfo]=useState('');
  const [busy,setBusy]=useState(false);
  const reset=()=>{setErr('');setInfo('');};

  const googleLogin=async()=>{
    setBusy(true);reset();
    const {error}=await sb.auth.signInWithOAuth({
      provider:'google',
      options:{redirectTo:window.location.origin+window.location.pathname,queryParams:{prompt:'consent'}}
    });
    if(error){setErr(window._ae(error.message));setBusy(false);}
  };

  const emailAction=async()=>{
    if(!email.trim()||!pass.trim()){setErr('Remplissez tous les champs.');return;}
    setBusy(true);reset();
    if(mode==='login'){
      const{error}=await sb.auth.signInWithPassword({email:email.trim(),password:pass});
      if(error)setErr(window._ae(error.message));else onClose();
    }else{
      const{error}=await sb.auth.signUp({email:email.trim(),password:pass,options:{emailRedirectTo:window.location.origin+window.location.pathname}});

      else{setInfo('📧 Email de confirmation envoyé. Vérifiez votre boîte mail, puis connectez-vous.');setMode('login');}
    }
    setBusy(false);
  };

    if(!email.trim()){setErr("Entrez votre email d'abord.");return;}
    setBusy(true);reset();

/*══════════════════════════════════════
  NEWS / ROADMAP (Markdown-like)
══════════════════════════════════════*/
function RoadmapView({content}) {
  const lines = (content||'').split('\n');
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {lines.map((line,i)=>{
        if(line.startsWith('## ')) return <p key={i} style={{fontFamily:'var(--fd)',fontSize:18,fontWeight:700,color:'var(--t1)',marginTop:i>0?8:0}}>{line.replace('## ','')}</p>;
        if(line.startsWith('**')&&line.endsWith('**')) return <p key={i} style={{fontWeight:700,fontSize:14,color:'var(--t1)',marginTop:6}}>{line.replace(/\*\*/g,'')}</p>;
        if(line.startsWith('- ')) return <div key={i} style={{display:'flex',gap:8,fontSize:13,color:'var(--t2)',paddingLeft:4}}><span style={{color:'var(--blue)',flexShrink:0}}>→</span>{line.slice(2)}</div>;
        if(line.trim()==='') return <div key={i} style={{height:6}}/>;
        return <p key={i} style={{fontSize:13,color:'var(--t2)',lineHeight:1.65}}>{line}</p>;
      })}
    </div>
  );
}

  const showMsg=(txt,type='ok')=>{setMsg(txt);setMsgType(type);setTimeout(()=>setMsg(''),3500);};

  /* ── Load real stats from Supabase ── */
  const loadStats=useCallback(async()=>{
    setLoading(true);

        sb.from('pro_users').select('*',{count:'exact',head:true}),
        sb.from('analyses_log').select('*',{count:'exact',head:true}),
        sb.from('analyses_log').select('*',{count:'exact',head:true}).gte('created_at',new Date(Date.now()-86400000).toISOString()),
      ]);
      /* Total users — via RPC si disponible, sinon estimation */
      let totalU='N/A';
      try{
        const{data:rpc}=await sb.rpc('get_user_count');
        if(rpc!=null)totalU=rpc;
      }catch(_){}
      setStats({users:totalU,proUsers:c1??0,analyses:c2??0,today:c3??0,mrr:((c1||0)*9.99).toFixed(2)+'€'});

  const email   = user?.email||'';
  const isAdmin = email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
  const name    = user?.user_metadata?.full_name||email;
  const initials= name.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';

  /* ── Auth & data init ── */
  useEffect(()=>{
    const init=async()=>{
      const{data:{session:s}}=await sb.auth.getSession();
      setSession(s);
      if(s?.user){
        const uid=s.user.id;const em=s.user.email||'';
        setUsage_(window._LS2.usage(uid));
        const pro=await window._isProUser(em)||window._LS2.codeUsed(uid);
        setIsPro(pro);
      }
      setAuthInit(true);
      /* Load site settings */
      const{data:bm}=await sb.from('site_settings').select('value').eq('key','beta_mode').single();
      if(bm?.value)setBetaMode(bm.value==='true');
      const{data:rm}=await sb.from('site_settings').select('value').eq('key','roadmap').single();
      if(rm?.value)setRoadmap(rm.value);
    };
    init();

    const{data:{subscription}}=sb.auth.onAuthStateChange(async(_ev,sess)=>{
      setSession(sess);
      if(sess?.user){
        const uid=sess.user.id;const em=sess.user.email||'';
        setUsage_(window._LS2.usage(uid));
        const pro=await window._isProUser(em)||window._LS2.codeUsed(uid);
        setIsPro(pro);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const logout=async()=>{
    await sb.auth.signOut();
    setSession(null);setIsPro(false);setUsage_(0);setImage(null);setResult(null);setErr(null);
  };

  /* ── File ── */
  const processFile=useCallback(f=>{
    if(!f||!f.type.startsWith('image/'))return;
    const r=new FileReader();
    r.onload=e=>{setImage(e.target.result);setResult(null);setErr(null);};
    r.readAsDataURL(f);
  },[]);
  const onDragOver =useCallback(e=>{e.preventDefault();setIsDrag(true);},[]);
  const onDragLeave=useCallback(()=>setIsDrag(false),[]);
  const onDrop     =useCallback(e=>{e.preventDefault();setIsDrag(false);processFile(e.dataTransfer.files[0]);},[processFile]);

  /* ── Analyze ── */
  const analyze=async()=>{
    if(!image)return;
    if(!user){setShowAuth(true);return;}
    if(usage>=1&&!isPro){setShowPW(true);return;}
    setLoading(true);setResult(null);setErr(null);

    const uid=user.id;
    const b64 =image.split(',')[1];
    const mtyp=image.split(';')[0].split(':')[1]||'image/jpeg';
    const data=await analyzeImage(b64,mtyp,uid);

    if(data?._error==='multi_object'){
      /* Ne pas consommer le crédit */
      setErr(data._message);
      setLoading(false);
      return;
    }

    setResult(data);
    const n=usage+1;setUsage_(n);window._LS2.setUse(uid,n);
    setLoading(false);
  };

  const features=[
    {icon:'🔍',t:'Détection Marque',s:'Identifie la marque & le modèle'},
    {icon:'✍️',t:'Description Naturelle',s:'Ton humanisé, pas robotique'},
    {icon:'💰',t:'Prix Marché Réel',s:'Basé sur Vinted France 2024'},
    {icon:'🏷️',t:'SEO Optimisé',s:'Tags Vinted & eBay prêts'},
  ];

  if(!authInit)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}}>
      <div style={{width:22,height:22,borderRadius:'50%',border:'2px solid rgba(0,122,255,.2)',borderTopColor:'#007AFF',animation:'spin-cw 1s linear infinite'}}/>
      <span style={{color:'var(--t2)',fontSize:14}}>Chargement…</span>
    </div>
  );

  return(
    <div className="mesh">
      {/* ══ NAV ══ */}
      <nav className="nav">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#007AFF,#00D4FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,boxShadow:'0 0 22px rgba(0,122,255,.38)'}}>⚡</div>
          <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:17}}>
            FlashSell<span style={{color:'#007AFF'}}>.ai</span>
          </span>
          {betaMode&&<span className="tag tag-beta">BÊTA</span>}
          {isPro&&!betaMode&&<span className="tag tag-gold" style={{fontSize:10,padding:'2px 8px',gap:4}}><I.Crown s={10}/> PRO</span>}
          {isAdmin&&<span className="tag tag-purple" style={{fontSize:10,padding:'2px 8px',gap:4}}><I.Shield/> ADMIN</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {!user?(
            <button className="btn-o" onClick={()=>setShowAuth(true)} style={{padding:'7px 14px'}}>
              <I.Google/> Se connecter
            </button>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {!isPro&&<button className="btn-o" onClick={()=>setShowPW(true)} style={{fontSize:12,padding:'6px 12px',color:'var(--blue)',borderColor:'var(--blue-b)'}}>Passer Pro</button>}
              {isAdmin&&<button className="btn-o" onClick={()=>setShowAdmin(true)} style={{fontSize:12,padding:'6px 12px',color:'var(--purple)',borderColor:'rgba(191,90,242,.3)'}}>
                <I.Shield/> Admin
              </button>}
              <div onClick={logout} title={`${email} — Cliquer pour déconnecter`}
                style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#007AFF,#0044CC)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',cursor:'pointer',flexShrink:0}}>
                {initials}
              </div>
            </div>
          )}
        </div>
      </nav>

      {/* ══ MAIN ══ */}
      <div style={{maxWidth:650,margin:'0 auto',padding:'40px 16px 80px'}}>

        {/* Hero */}
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'5px 14px',borderRadius:100,background:'rgba(0,122,255,.1)',border:'1px solid rgba(0,122,255,.2)',marginBottom:20}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:'var(--blue)',animation:'pulse-ring 2s infinite'}}/>
            <span style={{fontSize:11.5,fontWeight:600,color:'#6DBAFF',letterSpacing:'.05em'}}>Claude Vision · Détection marque · Prix marché réel</span>
          </div>
          <h1 style={{fontFamily:'var(--fd)',fontSize:'clamp(28px,6vw,52px)',fontWeight:800,lineHeight:1.1,marginBottom:14,letterSpacing:'-.03em'}}>
            <span className="gx">Transformez vos objets</span><br/>
            <span>en cash avec l'IA</span>
          </h1>
          <p style={{fontSize:'clamp(14px,2vw,16px)',color:'var(--t2)',maxWidth:420,margin:'0 auto',lineHeight:1.7}}>
            Photographiez n'importe quel article. L'IA identifie la marque, estime le prix réel et génère la fiche parfaite.
          </p>
        </div>

        {/* Public tabs */}
        <div className="tab-bar">
          <button className={`tab-btn${activeTab==='analyze'?' on':''}`} onClick={()=>setActiveTab('analyze')}>
            <I.Spark s={14} c="currentColor"/> Analyser un article
          </button>
          <button className={`tab-btn${activeTab==='news'?' on':''}`} onClick={()=>setActiveTab('news')}>
            <I.News/> Mises à jour
          </button>
        </div>

        {/* ── TAB: ANALYZE ── */}
        {activeTab==='analyze'&&(
          <>
            {/* Login banner */}
            {!user&&(
              <div className="g1 fu" style={{borderRadius:'var(--r)',padding:'18px 22px',marginBottom:20,textAlign:'center',borderColor:'rgba(0,122,255,.2)'}}>
                <p style={{fontWeight:600,fontSize:14,marginBottom:5}}>🔐 Connexion requise pour analyser</p>
                <p style={{fontSize:13,color:'var(--t2)',marginBottom:12}}>1 analyse gratuite offerte. Aucune carte nécessaire.</p>
                <button className="btn" onClick={()=>setShowAuth(true)} style={{padding:'10px 24px',borderRadius:'var(--r)',fontSize:14}}>
                  <I.Google/> Se connecter gratuitement
                </button>
              </div>
            )}

            {/* Pro banner */}
            {user&&isPro&&(
              <div className="fu" style={{padding:'10px 16px',borderRadius:'var(--rs)',background:'rgba(255,214,10,.07)',border:'1px solid rgba(255,214,10,.2)',display:'flex',alignItems:'center',gap:8,marginBottom:16,fontSize:13,color:'rgba(255,214,10,.9)'}}>
                <I.Crown s={14}/> FlashSell Pro actif — Analyses illimitées
              </div>
            )}

            {/* Upload / Results */}
            {!image?(
              <>
                <div className={`dz${isDrag?' on':''}`}
                  style={{border:'2px dashed rgba(255,255,255,.09)',padding:'50px 24px',textAlign:'center',cursor:'pointer',marginBottom:20}}
                  onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
                  onClick={()=>fileRef.current?.click()}>
                  <div className="fl" style={{marginBottom:14}}><I.Upload/></div>
                  <p style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:17,marginBottom:7}}>Glissez votre photo ici</p>
                  <p style={{fontSize:13,color:'var(--t3)'}}>ou <span style={{color:'var(--blue)',textDecoration:'underline'}}>cliquez pour sélectionner</span> · JPG, PNG, WEBP, HEIC</p>
                  <input ref={fileRef} type="file" accept="image/*" onChange={e=>processFile(e.target.files[0])} style={{display:'none'}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:16}}>
                  {features.map(f=>(
                    <div key={f.t} className="g1" style={{borderRadius:'var(--r)',padding:'15px 18px',display:'flex',alignItems:'center',gap:12}}>
                      <div style={{fontSize:22,flexShrink:0}}>{f.icon}</div>
                      <div><p style={{fontWeight:600,fontSize:13,marginBottom:2}}>{f.t}</p><p style={{fontSize:11.5,color:'var(--t3)'}}>{f.s}</p></div>
                    </div>
                  ))}
                </div>
                <p style={{textAlign:'center',fontSize:11.5,color:'var(--t3)'}}>
                  🔒 1 article par photo · Photos non stockées · 1ère analyse <span style={{color:'var(--blue)'}}>gratuite</span>
                </p>
              </>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                {/* Preview */}
                <div style={{position:'relative',borderRadius:'var(--rl)',overflow:'hidden',border:'1px solid var(--b1)'}}>
                  <img src={image} alt="" style={{width:'100%',maxHeight:300,objectFit:'cover',display:'block'}}/>
                  <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(7,7,15,.72) 0%,transparent 44%)',pointerEvents:'none'}}/>
                  <button onClick={()=>{setImage(null);setResult(null);setErr(null);}}
                    style={{position:'absolute',top:12,right:12,width:30,height:30,borderRadius:'50%',background:'rgba(7,7,15,.82)',border:'1px solid var(--b2)',color:'var(--t1)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <I.X s={12}/>
                  </button>
                  {!result&&!loading&&<div style={{position:'absolute',bottom:12,left:0,right:0,textAlign:'center'}}><span style={{fontSize:12,color:'rgba(255,255,255,.48)'}}>Photo prête ✓</span></div>}
                </div>

                {err&&(
                  <div className="er fu" style={{display:'flex',alignItems:'flex-start',gap:10}}>
                    <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
                    <span>{err}</span>
                  </div>
                )}

                {!result&&!loading&&(
                  <button className="btn" onClick={analyze} style={{width:'100%',padding:'15px',fontSize:16,borderRadius:'var(--r)'}}>
                    <I.Spark s={18} c="#fff"/>
                    {!user?'Connectez-vous pour analyser':"Analyser avec l'IA"}
                    {user&&usage===0&&!isPro&&<span style={{fontSize:11,background:'rgba(255,255,255,.18)',padding:'3px 10px',borderRadius:100}}>GRATUIT</span>}
                  </button>
                )}

                {loading&&<div className="g1" style={{borderRadius:'var(--rl)'}}><AILoader/></div>}
                {result&&<ResultCard result={result}/>}
                {(result||err)&&(
                  <button className="btn-o" onClick={()=>{setImage(null);setResult(null);setErr(null);}} style={{width:'100%',padding:'12px',borderRadius:'var(--r)'}}>
                    ↩ Analyser un autre article
                  </button>
                )}
              </div>
            )}

            {/* Usage indicator */}
            {user&&!isPro&&(
              <div style={{textAlign:'center',marginTop:20}}>
                <p style={{fontSize:12,color:'var(--t3)'}}>
                  {usage===0
                    ?<>🎁 <span style={{color:'var(--t2)'}}>1 analyse gratuite disponible</span></>
                    :<><span style={{color:'var(--t2)'}}>{usage} analyse(s) utilisée(s) · </span><span style={{color:'var(--blue)',cursor:'pointer'}} onClick={()=>setShowPW(true)}>Débloquer Pro →</span></>
                  }
                </p>
              </div>
            )}
          </>
        )}

        {/* ── TAB: NEWS / ROADMAP ── */}
        {activeTab==='news'&&(
          <div className="g1 fu" style={{borderRadius:'var(--r)',padding:'24px'}}>
            {roadmap
              ?<RoadmapView content={roadmap}/>
              :<div style={{textAlign:'center',padding:'32px',color:'var(--t3)',fontSize:13}}>Aucune mise à jour pour l'instant.</div>
            }
          </div>
        )}
      </div>

      {/* ══ FOOTER ══ */}
      <div style={{textAlign:'center',padding:'18px',borderTop:'1px solid var(--b1)'}}>
        <p style={{fontSize:11,color:'var(--t3)'}}>FlashSell.ai v2.0 · Claude Vision · {new Date().getFullYear()}</p>
      </div>

      {/* Admin FAB discret (visible uniquement si admin) */}
      {isAdmin&&(
        <button className="admin-fab" onClick={()=>setShowAdmin(true)} title="Dashboard Admin">
          🛡️
        </button>
      )}

      {/* ══ MODALS ══ */}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)}/>}
      {showPW&&<PaywallModal userId={user?.id} userEmail={email} onClose={()=>setShowPW(false)} onUnlock={()=>setIsPro(true)}/>}
      {showAdmin&&isAdmin&&(
        <AdminPanel
          session={session}
          betaMode={betaMode}
          onBetaChange={v=>{setBetaMode(v);}}
          onClose={()=>setShowAdmin(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
