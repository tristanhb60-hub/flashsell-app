/* ═══════════════════════════════════════
   ANALYSEUR D'IMAGE INTELLIGENT
   1) Détecte couleur dominante via Canvas
   2) Envoie à Claude API (si dispo)
   3) Fallback template intelligent selon couleurs
═══════════════════════════════════════ */
function detectDominantColor(base64) {
  return new Promise(resolve => {
    try {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const cv = document.createElement('canvas');
        cv.width = 80; cv.height = 80;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0, 80, 80);
        const d = ctx.getImageData(0,0,80,80).data;
        let r=0,g=0,b=0,n=0;
        for (let i=0;i<d.length;i+=4){
          /* Skip near-white and near-black */
          const br=(d[i]+d[i+1]+d[i+2])/3;
          if (br>240||br<15) continue;
          r+=d[i];g+=d[i+1];b+=d[i+2];n++;
        }
        if (!n) { resolve({r:128,g:128,b:128,name:'neutre'}); return; }
        r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
        /* Named color */
        const max=Math.max(r,g,b), min=Math.min(r,g,b), diff=max-min;
        let name='neutre';
        if (diff<30) name=max>150?'blanc/crème':'gris/anthracite';
        else if (r>g&&r>b) name=r>180?'rouge vif':'bordeaux/marron';
        else if (g>r&&g>b) name=g>150?'vert':'kaki/olive';
        else if (b>r&&b>g) name=b>150?'bleu':'marine/indigo';
        else if (r>150&&g>150&&b<100) name='jaune/doré';
        else if (r>150&&b>100&&g<100) name='violet/rose';
        else if (r>140&&g>80&&b<60) name='orange/rouille';
        resolve({r,g,b,name,hex:`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`});
      };
      img.onerror = ()=>resolve({r:128,g:128,b:128,name:'neutre'});
      img.src = 'data:image/jpeg;base64,'+base64;
    } catch(_){ resolve({r:128,g:128,b:128,name:'neutre'}); }
  });
}

window._authErr = (msg) => {
  const m = (msg||'').toLowerCase();
  if (m.includes('invalid login credentials'))    return 'Email ou mot de passe incorrect.';
  if (m.includes('user already registered'))      return 'Cet email est déjà utilisé. Essayez de vous connecter.';
  if (m.includes('email already'))               return 'Cet email est déjà enregistré.';
  if (m.includes('password should be at least')) return 'Le mot de passe doit faire au moins 6 caractères.';
  if (m.includes('unable to validate'))           return 'Impossible de valider votre email. Vérifiez le format.';
  if (m.includes('email not confirmed'))          return 'Veuillez confirmer votre email avant de vous connecter.';
  if (m.includes('too many requests'))            return 'Trop de tentatives. Attendez quelques minutes.';
  if (m.includes('network'))                      return 'Erreur réseau. Vérifiez votre connexion.';
  return msg || 'Une erreur est survenue.';
};

/* ══════════ MAIN APP ══════════ */
function App() {
  const [session,    setSession]    = useState(null);
  const [authInit,   setAuthInit]   = useState(false);
  const [showAuth,   setShowAuth]   = useState(false);
  const [showPW,     setShowPW]     = useState(false);
  const [showAdmin,  setShowAdmin]  = useState(false);
  const [image,      setImage]      = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [result,     setResult]     = useState(null);
  const [usage,      setUsage_]     = useState(0);
  const [isPro,      setIsPro]      = useState(false);
  const [isDrag,     setIsDrag]     = useState(false);
  const [err,        setErr]        = useState(null);
  const fileRef = useRef(null);

  /* Computed */
  const user      = session?.user;
  const email     = user?.email||'';
  const isAdmin   = email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
  const name      = user?.user_metadata?.full_name||email;
  const initials  = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';

  /* ── Auth init ── */
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if (session?.user) {
        const uid = session.user.id;
        const em  = session.user.email||'';
        setUsage_(window._LS.usage(uid));
        setIsPro(window._LS.isPro(uid,em));
      }
      setAuthInit(true);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_ev,sess)=>{
      setSession(sess);
      if (sess?.user) {
        const uid = sess.user.id;
        const em  = sess.user.email||'';
        setUsage_(window._LS.usage(uid));
        setIsPro(window._LS.isPro(uid,em));
      }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const logout = async()=>{
    await sb.auth.signOut();
    setSession(null); setIsPro(false); setUsage_(0); setImage(null); setResult(null);
  };

  /* ── File handling ── */
  const processFile = useCallback(f=>{
    if (!f||!f.type.startsWith('image/')) return;
    const r=new FileReader();
    r.onload=e=>{setImage(e.target.result);setResult(null);setErr(null);};
    r.readAsDataURL(f);
  },[]);
  const onDragOver  = useCallback(e=>{e.preventDefault();setIsDrag(true);},[]);
  const onDragLeave = useCallback(()=>setIsDrag(false),[]);
  const onDrop      = useCallback(e=>{e.preventDefault();setIsDrag(false);processFile(e.dataTransfer.files[0]);},[processFile]);

  /* ── Analyze ── */
  const analyze = async()=>{
    if (!image) return;
    if (!user)  { setShowAuth(true); return; }
    if (usage>=1&&!isPro) { setShowPW(true); return; }
    setLoading(true); setResult(null); setErr(null);
    try {
      const b64  = image.split(',')[1];
      const mtyp = image.split(';')[0].split(':')[1]||'image/jpeg';
      const data = await analyzeImage(b64,mtyp);
      setResult(data);
      const n=usage+1; setUsage_(n);
      if (user) window._LS.setUse(user.id,n);
    } catch(e){ setErr('Analyse échouée. Vérifiez votre connexion et réessayez.'); }
    setLoading(false);
  };

  const features = [
    {icon:'🎯',t:'Titre SEO',s:'Optimisé pour être trouvé'},
    {icon:'✍️',t:'Copywriting IA',s:'Description qui convertit'},
    {icon:'💰',t:'Prix intelligent',s:'Estimation marché réelle'},
    {icon:'🏷️',t:'Mots-clés',s:'Vinted & eBay ready'},
  ];

  if (!authInit) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}}>
      <div style={{width:22,height:22,borderRadius:'50%',border:'2px solid rgba(0,122,255,.2)',borderTopColor:'#007AFF',animation:'spin-cw 1s linear infinite'}}/>
      <span style={{color:'var(--muted)',fontSize:14}}>Chargement…</span>
    </div>
  );

  return (
    <div className="mesh">
      {/* ══ NAV ══ */}
      <nav className="nav">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#007AFF,#00D4FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,boxShadow:'0 0 22px rgba(0,122,255,.4)'}}>⚡</div>
          <span style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:17,color:'var(--text)'}}>
            FlashSell<span style={{color:'#007AFF'}}>.ai</span>
          </span>
          {isPro&&<span className="tag tag-gold" style={{fontSize:10,padding:'2px 8px',gap:4}}><Ic.Crown s={11}/> PRO</span>}
          {isAdmin&&<span className="tag tag-purple" style={{fontSize:10,padding:'2px 8px',gap:4}}><Ic.Shield/> ADMIN</span>}
        </div>

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {!user ? (
            <button className="btn-o" onClick={()=>setShowAuth(true)} style={{padding:'7px 14px'}}>
              <Ic.Google/> Se connecter

              {!isPro&&(
                <button className="btn-o" onClick={()=>setShowPW(true)} style={{fontSize:12,padding:'6px 12px',color:'var(--blue)',borderColor:'var(--blue-border)'}}>

              {isAdmin&&(
                <button className="btn-o" onClick={()=>setShowAdmin(true)} style={{fontSize:12,padding:'6px 12px',color:'var(--purple)',borderColor:'rgba(191,90,242,.3)'}}>
                  <Ic.Admin/> Admin
                </button>
              )}
              <div onClick={logout} title={`${email} — Cliquer pour déconnecter`}
                style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#007AFF,#0044CC)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',cursor:'pointer',flexShrink:0}}>
                {initials}
              </div>
            </div>
          )}
        </div>
      </nav>

      {/* ══ CONTENT ══ */}
      <div style={{maxWidth:640,margin:'0 auto',padding:'44px 16px 80px'}}>

        {/* Hero */}
        <div style={{textAlign:'center',marginBottom:48}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 16px',borderRadius:100,background:'rgba(0,122,255,.1)',border:'1px solid rgba(0,122,255,.2)',marginBottom:22}}>

            <span className="gx">Transformez vos objets</span><br/>
            <span>en cash avec l'IA</span>
          </h1>

            Photographiez n'importe quoi. L'IA génère le titre, la description persuasive et le prix parfait.

        {/* Login CTA if not logged */}
        {!user&&(

      </div>

      {/* ══ MODALS ══ */}
      {showAuth  &&<AuthModal onClose={()=>setShowAuth(false)}/>}
      {showPW    &&<PaywallModal userId={user?.id} userEmail={email} onClose={()=>setShowPW(false)} onUnlock={()=>setIsPro(true)}/>}
      {showAdmin &&isAdmin&&<AdminPanel session={session} onClose={()=>setShowAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
